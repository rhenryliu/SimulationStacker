beam_test_config: mass_ratio_beamTest_z026.yaml
no_beam_config:   mass_ratio_noBeam_z026.yaml

compensation:
  use_sim_scatter: false  # if true, scatter of beam_factor across sims is propagated into data error

plot:
  data_path: /pscratch/sd/r/rhliu/projects/Weak_lensing/ratio_measurements/spec_Y3/ratio_BGS_full_no_src_with_cluster_mask_zbin0_DSigma_ksz_ggl.npz
  fig_path: '../figures/'
  fig_name: 'beam_compensated_z026'
  fig_type: 'pdf'
  plot_error_bars: true

# Extra simulation ratios to overlay (used only by beam_compensated_ratio_v2.py).
# Each entry is stacked with the same parameters as the primary ratio but with a
# different numerator particle type.  The denominator (particle_type_2 from
# no_beam_config) and all other stacking settings are shared.
extra_sim_ratios:
  - numerator: gas
    linestyle: ':'
  - numerator: baryon
    linestyle: '--'
