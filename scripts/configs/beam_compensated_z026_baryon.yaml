# Total-baryon companion to beam_compensated_z026.yaml (paper Fig. 17a).
# The beam compensation is still calibrated on ionized gas (beam_test_config is
# shared with the ionized-gas figure), since the data points are the same kSZ
# measurement in both figures — only the simulation curves change to baryon/total.
beam_test_config: mass_ratio_beamTest_z026.yaml
no_beam_config:   mass_ratio_noBeam_z026_baryon.yaml

compensation:
  use_sim_scatter: false  # if true, scatter of beam_factor across sims is propagated into data error

plot:
  data_path: /pscratch/sd/r/rhliu/projects/Weak_lensing/ratio_measurements/spec_Y3/ratio_BGS_full_no_src_with_cluster_mask_zbin0_DSigma_ksz_ggl.npz
  fig_path: '../figures/'
  fig_name: 'beam_compensated_z026'
  fig_type: 'pdf'
  plot_error_bars: true
  ylabel: '$f_{\rm baryon}(R)$'

# No extra_sim_ratios: this figure shows only the primary baryon/total curves.
